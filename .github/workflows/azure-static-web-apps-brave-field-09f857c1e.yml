name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRAVE_FIELD_09F857C1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "." # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

          # ---------------------------------------------------------------------------
          # Application settings (Azure environment variables / config values)
          #
          # These are set as Application Settings on the deployed Static Web App.
          # They are available to Azure Functions API routes as process.env.<KEY>.
          #
          # HOW TO ADD A NEW SETTING
          # ─────────────────────────
          # Non-sensitive value  → put it directly here, e.g.  MY_SETTING=my-value
          # Sensitive value      → store it as a GitHub repository secret first
          #                        (repo → Settings → Secrets and variables → Actions)
          #                        then reference it as  MY_SECRET=${{ secrets.MY_SECRET }}
          #
          # EXAMPLES (uncomment and replace with real names/values):
          # app_settings: |
          #   COSMOS_DB_CONNECTION_STRING=${{ secrets.COSMOS_DB_CONNECTION_STRING }}
          #   STORAGE_ACCOUNT_KEY=${{ secrets.STORAGE_ACCOUNT_KEY }}
          #   APP_ENV=production
          #   FEATURE_FLAG_NEW_UI=true
          # ---------------------------------------------------------------------------

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRAVE_FIELD_09F857C1E }}
          action: "close"
